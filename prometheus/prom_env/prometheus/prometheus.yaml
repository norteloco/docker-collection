global:
  scrape_interval: "30s"
  scrape_timeout: "10s"
  evaluation_interval: "30s"
  metric_name_validation_scheme: "utf8"

scrape_configs:
  - job_name: node
    scrape_interval: "1m"
    metrics_path: /metrics
    static_configs:
      - targets:
        - node-exporter:9100

  - job_name: cadvisor
    scrape_interval: "1m"
    metrics_path: /metrics
    static_configs:
      - targets:
        - cadvisor:8080

  - job_name: blackbox
    scrape_interval: "1m"
    metrics_path: /probe
    params:
      modules:
        - http_2xx
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115
    static_configs:
      - targets:
        - https://norteloco.github.io
        - https://prometheus.io
        - prometheus:9090
        - node-exporter:9100
        - cadvisor:8080
        - blackbox:9115
        - alertmanager:9093 

rule_files:
  - 'node.rules'
  - 'blackbox.rules'
  - 'cadvisor.rules'

alerting:
  alertmanagers:
    - static_configs:
      - targets: ['alertmanager:9093']