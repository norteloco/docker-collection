services:
  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: prometheus
    hostname: prometheus
    restart: unless-stopped
    ports:
      - 9090:9090
    volumes:
      - ./prom_env/prometheus:/etc/prometheus
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./prom_data/prometheus:/prometheus/data
    env_file:
     - .prom_env
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
      - '--storage.tsdb.path=/prometheus/data'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=30GB'
      - '--storage.tsdb.wal-compression'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      prom_net:
        aliases:
          - prometheus
          - prom

  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    hostname: node-exporter
    restart: unless-stopped
    ports:
      - 9100:9100
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    env_file:
      - .prom_env
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/containers|rootfs/var/lib/docker/overlay2|rootfs/var/lib/docker/aufs|rootfs/run/docker/netns)($|/)'
    networks:
      prom_net:
        aliases:
          - prometheus-node-exporter
          - prom-node-exporter
          - node-exporter

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: cadvisor
    hostname: cadvisor
    restart: unless-stopped
    ports:
      - 8080:8080
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s    
    networks:
      prom_net:
        aliases:
          - prometheus-cadvisor
          - prom-cadvisor
          - cadvisor

  blackbox-exporter:
    image: prom/blackbox-exporter
    container_name: blackbox-exporter
    hostname: blackbox-exporter
    restart: unless-stopped
    ports:
      - 9115:9115
    volumes:
      - ./prom_env/blackbox:/etc/blackbox
    env_file:
      - .prom_env
    command: 
      - '--config.file=/etc/blackbox/blackbox.yaml'
    networks:
      prom_net:
        aliases:
          - prometheus-blackbox-exporter
          - prometheus-blackbox
          - prom-blackbox
          - blackbox

  alertmanager:
    image: prom/alertmanager
    container_name: alertmanager
    hostname: alertmanager
    restart: unless-stopped
    ports:
      - 9093:9093
    volumes:
      - ./prom_env/alertmanager:/etc/alertmanager
      - ./prom_data/alertmanager:/alertmanager/data
    env_file:
      - .prom_env
    secrets:
      - BOT_TOKEN
      - CHAT_ID
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yaml'
      - '--storage.path=/alertmanager/data'
    networks:
      prom_net:
        aliases:
          - prometheus-alertmanager
          - prom-alertmanager
          - alertmanager

secrets:
  BOT_TOKEN:
    file: ./env_vars/.BOT_TOKEN
  CHAT_ID:
    file: ./env_vars/.CHAT_ID

networks:
  prom_net:
    driver: bridge
    enable_ipv6: false
    ipam:
      driver: default
      config: 
      - subnet: 172.16.231.0/24